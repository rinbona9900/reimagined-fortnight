name: Deploy Ollama + Latest Models + Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      use_cloud_models:
        description: 'Enable cloud models (MiniMax, Kimi, GLM, etc.) alongside local models'
        required: false
        default: 'true'
      primary_local_model:
        description: 'Primary local model for fallback (e.g., lfm2.5, north-mini-code-1.0, ornith:9b)'
        required: false
        default: 'lfm2.5'

env:
  # Latest Cloud Models (Simultaneous)
  CLOUD_MODELS: "minimax-m3:cloud,kimi-k2.7-code:cloud,gemma4:cloud,qwen3.6:27b,gemma4:12b,gemma4:31b"
  # Latest Local Models (Optimized for 16GB RAM / 4-Core)
  PRIMARY_LOCAL: ${{ inputs.primary_local_model || 'lfm2.5' }}
  FALLBACK_LOCAL_1: 'north-mini-code-1.0'
  FALLBACK_LOCAL_2: 'ornith:9b'
  FALLBACK_LOCAL_3: 'phi4:14b'
  NUM_CTX: 32768
  OLLAMA_HOST: '127.0.0.1:11434'
  LITELLM_PORT: 4000

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y zstd curl lsof net-tools jq

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Configure Ollama for CPU only
      run: |
        echo 'export OLLAMA_HOST=http://127.0.0.1:11434' >> $GITHUB_ENV
        echo 'export OLLAMA_NUM_CTX=${{ env.NUM_CTX }}' >> $GITHUB_ENV
        echo 'export OLLAMA_KEEP_ALIVE=30m' >> $GITHUB_ENV
        echo 'export OLLAMA_FLASH_ATTENTION=0' >> $GITHUB_ENV
        echo 'export OLLAMA_NUM_PARALLEL=1' >> $GITHUB_ENV

    - name: Start Ollama service
      run: |
        sudo systemctl start ollama
        sleep 5
        sudo systemctl status ollama --no-pager

    - name: Pull Latest Cloud Models (Simultaneous)
      if: inputs.use_cloud_models == 'true' || inputs.use_cloud_models == ''
      run: |
        echo "Pulling latest cloud models..."
        IFS=',' read -ra MODELS <<< "${{ env.CLOUD_MODELS }}"
        for model in "${MODELS[@]}"; do
          echo "Pulling $model..."
          ollama pull $model || echo "Warning: Failed to pull $model"
        done
        echo "Cloud models ready."

    - name: Pull Primary Local Model
      run: |
        echo "Pulling primary local model: ${{ env.PRIMARY_LOCAL }}"
        ollama pull ${{ env.PRIMARY_LOCAL }}

    - name: Verify Local Model Tool Support
      id: verify_local
      run: |
        MODEL_TO_USE=""
        
        # Test Primary Local
        echo "Testing ${{ env.PRIMARY_LOCAL }}..."
        PROBE='{
          "model": "${{ env.PRIMARY_LOCAL }}",
          "messages": [{"role": "user", "content": "What'\''s the weather in Paris? Use the get_weather tool."}],
          "tools": [{"type": "function", "function": {"name": "get_weather", "description": "Get weather", "parameters": {"type": "object", "properties": {"city": {"type": "string"}}, "required": ["city"]}}}],
          "stream": false
        }'
        RESPONSE=$(curl -s -X POST http://localhost:11434/api/chat -H "Content-Type: application/json" -d "$PROBE")
        if echo "$RESPONSE" | jq -e '.message.tool_calls' > /dev/null; then
          MODEL_TO_USE="${{ env.PRIMARY_LOCAL }}"
          echo "Primary model $MODEL_TO_USE supports tools."
        else
          echo "Primary failed. Trying ${{ env.FALLBACK_LOCAL_1 }}..."
          ollama pull ${{ env.FALLBACK_LOCAL_1 }}
          PROBE=$(echo "$PROBE" | sed "s/${{ env.PRIMARY_LOCAL }}/${{ env.FALLBACK_LOCAL_1 }}/g")
          RESPONSE=$(curl -s -X POST http://localhost:11434/api/chat -H "Content-Type: application/json" -d "$PROBE")
          if echo "$RESPONSE" | jq -e '.message.tool_calls' > /dev/null; then
            MODEL_TO_USE="${{ env.FALLBACK_LOCAL_1 }}"
          else
            echo "Fallback 1 failed. Trying ${{ env.FALLBACK_LOCAL_2 }}..."
            ollama pull ${{ env.FALLBACK_LOCAL_2 }}
            PROBE=$(echo "$PROBE" | sed "s/${{ env.FALLBACK_LOCAL_1 }}/${{ env.FALLBACK_LOCAL_2 }}/g")
            RESPONSE=$(curl -s -X POST http://localhost:11434/api/chat -H "Content-Type: application/json" -d "$PROBE")
            if echo "$RESPONSE" | jq -e '.message.tool_calls' > /dev/null; then
              MODEL_TO_USE="${{ env.FALLBACK_LOCAL_2 }}"
            else
              echo "Fallback 2 failed. Trying ${{ env.FALLBACK_LOCAL_3 }}..."
              ollama pull ${{ env.FALLBACK_LOCAL_3 }}
              PROBE=$(echo "$PROBE" | sed "s/${{ env.FALLBACK_LOCAL_2 }}/${{ env.FALLBACK_LOCAL_3 }}/g")
              RESPONSE=$(curl -s -X POST http://localhost:11434/api/chat -H "Content-Type: application/json" -d "$PROBE")
              if echo "$RESPONSE" | jq -e '.message.tool_calls' > /dev/null; then
                MODEL_TO_USE="${{ env.FALLBACK_LOCAL_3 }}"
              else
                echo "All local models failed tool support check."
                exit 1
              fi
            fi
          fi
        fi
        
        echo "MODEL_TO_USE=$MODEL_TO_USE" >> $GITHUB_ENV
        echo "Selected local model: $MODEL_TO_USE"

    - name: Install LiteLLM
      run: |
        pip install litellm[proxy]

    - name: Generate LiteLLM config with All Models
      run: |
        LITELLM_KEY="sk-ghactions-${RANDOM}-$(openssl rand -hex 16)"
        echo "LITELLM_KEY=$LITELLM_KEY" >> $GITHUB_ENV
        
        # Build model list dynamically
        cat > litellm_config.yaml << EOF
        model_list:
          # Local Fallback Model
          - model_name: ${MODEL_TO_USE}
            litellm_params:
              model: ollama_chat/${MODEL_TO_USE}
              api_base: http://${{ env.OLLAMA_HOST }}
              num_ctx: ${{ env.NUM_CTX }}
              api_key: "ollama-local"
EOF

        # Add cloud models if enabled
        if [ "${{ inputs.use_cloud_models }}" == "true" ] || [ -z "${{ inputs.use_cloud_models }}" ]; then
          cat >> litellm_config.yaml << EOF
          - model_name: minimax-m3
            litellm_params:
              model: ollama_chat/minimax-m3:cloud
              api_base: http://${{ env.OLLAMA_HOST }}
              api_key: "ollama-cloud"
          - model_name: kimi-k2.7-code
            litellm_params:
              model: ollama_chat/kimi-k2.7-code:cloud
              api_base: http://${{ env.OLLAMA_HOST }}
              api_key: "ollama-cloud"
          - model_name: gemma4-12b
            litellm_params:
              model: ollama_chat/gemma4:12b
              api_base: http://${{ env.OLLAMA_HOST }}
              api_key: "ollama-cloud"
          - model_name: gemma4-31b
            litellm_params:
              model: ollama_chat/gemma4:31b
              api_base: http://${{ env.OLLAMA_HOST }}
              api_key: "ollama-cloud"
          - model_name: qwen3.6-27b
            litellm_params:
              model: ollama_chat/qwen3.6:27b
              api_base: http://${{ env.OLLAMA_HOST }}
              api_key: "ollama-cloud"
EOF
        fi

        cat >> litellm_config.yaml << EOF

        general_settings:
          master_key: "$LITELLM_KEY"

        litellm_settings:
          drop_params: true
          set_tool_choice_to_always: false
          telemetry: false
          request_timeout: 600
EOF
        echo "LiteLLM config generated with models: ${MODEL_TO_USE} + cloud models"

    - name: Start LiteLLM proxy
      run: |
        litellm --config litellm_config.yaml --port ${{ env.LITELLM_PORT }} &
        sleep 10
        if ! nc -z localhost ${{ env.LITELLM_PORT }}; then
          echo "LiteLLM failed to start"
          exit 1
        fi

    - name: Test LiteLLM proxy with local model
      run: |
        PROXY_PROBE='{
          "model": "${{ env.MODEL_TO_USE }}",
          "messages": [{"role": "user", "content": "What'\''s the weather in Tokyo? Use the get_weather tool."}],
          "tools": [{"type": "function", "function": {"name": "get_weather", "description": "Get weather", "parameters": {"type": "object", "properties": {"city": {"type": "string"}}, "required": ["city"]}}}]
        }'
        
        RESPONSE=$(curl -s -X POST http://localhost:${{ env.LITELLM_PORT }}/v1/chat/completions \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ env.LITELLM_KEY }}" \
          -d "$PROXY_PROBE")
        
        echo "Proxy test response: $RESPONSE"
        
        if echo "$RESPONSE" | jq -e '.choices[0].message.tool_calls' > /dev/null; then
          echo "LiteLLM proxy works correctly with ${{ env.MODEL_TO_USE }}."
        else
          echo "LiteLLM proxy test failed."
          exit 1
        fi

    - name: Download Cloudflared
      run: |
        curl -L --output cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared

    - name: Start Cloudflared tunnel
      run: |
        ./cloudflared tunnel --url http://localhost:${{ env.LITELLM_PORT }} > cloudflare.log 2>&1 &
        sleep 10
        TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' cloudflare.log | head -n 1)
        if [ -z "$TUNNEL_URL" ]; then
          echo "Failed to get tunnel URL from log:"
          cat cloudflare.log
          exit 1
        fi
        echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
        echo "Cloudflare tunnel URL: $TUNNEL_URL"

    - name: Output connection details
      run: |
        echo "=== DEPLOYMENT COMPLETE ==="
        echo "Base URL: ${{ env.TUNNEL_URL }}/v1"
        echo "API Key: ${{ env.LITELLM_KEY }}"
        echo "Local Model: ${{ env.MODEL_TO_USE }}"
        echo "Cloud Models: minimax-m3, kimi-k2.7-code, gemma4, qwen3.6 (if enabled)"
        echo "Context: ${{ env.NUM_CTX }}"
        
        # Generate OpenCode config with all models
        cat > opencode_config.json << EOF
        {
          "\$schema": "https://opencode.ai/config.json",
          "provider": {
            "gh-actions-backend": {
              "npm": "@ai-sdk/openai-compatible",
              "name": "GH-Actions-Ollama-Proxy",
              "options": {
                "baseURL": "${{ env.TUNNEL_URL }}/v1",
                "apiKey": "${{ env.LITELLM_KEY }}",
                "timeout": 600000
              },
              "models": {
                "${{ env.MODEL_TO_USE }}": {
                  "id": "${{ env.MODEL_TO_USE }}",
                  "name": "Local Fallback (${{ env.MODEL_TO_USE }})",
                  "tool_call": true,
                  "temperature": true,
                  "limit": {"context": ${{ env.NUM_CTX }}, "output": 8192},
                  "options": {"temperature": 0.2, "top_p": 0.95, "num_ctx": ${{ env.NUM_CTX }}}
                },
                "minimax-m3": {
                  "id": "minimax-m3",
                  "name": "MiniMax M3 (Cloud)",
                  "tool_call": true,
                  "temperature": true,
                  "limit": {"context": 1000000, "output": 8192}
                },
                "kimi-k2.7-code": {
                  "id": "kimi-k2.7-code",
                  "name": "Kimi K2.7 Code (Cloud)",
                  "tool_call": true,
                  "temperature": true,
                  "limit": {"context": 256000, "output": 8192}
                },
                "gemma4-12b": {
                  "id": "gemma4-12b",
                  "name": "Gemma 4 12B (Cloud)",
                  "tool_call": true,
                  "temperature": true
                },
                "gemma4-31b": {
                  "id": "gemma4-31b",
                  "name": "Gemma 4 31B (Cloud)",
                  "tool_call": true,
                  "temperature": true
                },
                "qwen3.6-27b": {
                  "id": "qwen3.6-27b",
                  "name": "Qwen 3.6 27B (Cloud)",
                  "tool_call": true,
                  "temperature": true
                }
              }
            }
          },
          "model": "gh-actions-backend/${{ env.MODEL_TO_USE }}"
        }
EOF
        
        echo "OpenCode Config:"
        cat opencode_config.json

    - name: Upload OpenCode Config
      uses: actions/upload-artifact@v4
      with:
        name: opencode-config
        path: opencode_config.json

    - name: Keep alive and monitor
      run: |
        echo "Monitoring services..."
        echo "Available models: ${{ env.MODEL_TO_USE }} (local), minimax-m3, kimi-k2.7-code, gemma4, qwen3.6 (cloud)"
        sleep 300
