name: Deploy Ollama + LiteLLM + Cloudflare Tunnel

# ─────────────────────────────────────────────────────────────────────────────
# ARCHITECTURE OVERVIEW
#
#  1. Install Ollama on the GitHub-hosted runner.
#  2. Pull ONE selected local model (your dropdown choice).
#  3. Create a custom Modelfile so num_ctx is actually enforced at inference.
#  4. Optionally pull cloud models (minimax-m3:cloud, kimi-k2.7-code:cloud, …)
#     These are real Ollama registry models — ollama pull handles them the same
#     way as any other model.
#  5. Start LiteLLM as an OpenAI-compatible proxy in front of Ollama.
#  6. Open a Cloudflare Quick Tunnel so you can reach LiteLLM from anywhere.
#  7. Generate an opencode_config.json that lists every model that was
#     successfully pulled.
#  8. Stay alive for up to 6 hours (GitHub's maximum job duration), printing
#     health status every 5 minutes so you can monitor the run in the Actions UI.
#
# ENVIRONMENT VARIABLE STRATEGY
#  GitHub Actions evaluates  ${{ env.* }}  expressions at job startup — before
#  any steps run — so values written to $GITHUB_ENV during a step are NOT
#  visible to subsequent  ${{ env.* }}  references in the same job.
#
#  Solution used throughout this file:
#    • Write to $GITHUB_ENV once (so the value survives across steps as a
#      shell variable when each step sources the environment automatically).
#    • Inside every step that needs a value set by a *previous* step, read it
#      via the bare shell variable  $VAR  (not  ${{ env.VAR }} ).
#    • The only ${{ env.* }} references kept below are for values defined in
#      the top-level  env:  block, which ARE evaluated at startup.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:

      local_model:
        description: 'Local model to run on the runner'
        required: true
        type: choice
        options:
          - lfm2.5
          - north-mini-code-1.0
          - ornith:9b
          - phi4:14b
          - qwen3:14b
          - qwen3:32b
        default: lfm2.5

      use_cloud_models:
        description: 'Also pull cloud models (minimax-m3:cloud, kimi-k2.7-code:cloud, etc.)'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

# ── Top-level env: only for values known at workflow-parse time ───────────────
env:
  OLLAMA_BASE_URL: 'http://127.0.0.1:11434'
  LITELLM_PORT: '4000'
  NUM_CTX: '32768'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub's hard cap is 6 hours (360 min). Set just under to be safe.
    timeout-minutes: 350

    steps:

    # ── 1. Checkout ──────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. System dependencies ───────────────────────────────────────────────
    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y curl jq netcat-openbsd openssl

    # ── 3. Python (for LiteLLM) ──────────────────────────────────────────────
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ── 4. Install Ollama ────────────────────────────────────────────────────
    - name: Install Ollama
      run: curl -fsSL https://ollama.com/install.sh | sh

    # ── 5. Start Ollama service ──────────────────────────────────────────────
    - name: Start Ollama service
      run: |
        # Serve with explicit host so it matches OLLAMA_BASE_URL
        OLLAMA_HOST=0.0.0.0:11434 ollama serve > ollama.log 2>&1 &

        echo "Waiting for Ollama to become ready..."
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then
            echo "✅ Ollama is ready (attempt $i)."
            break
          fi
          echo "  attempt $i/30 — sleeping 3s..."
          sleep 3
        done

        # Final check — fail fast if Ollama never came up
        curl -sf http://127.0.0.1:11434/api/tags > /dev/null || {
          echo "❌ Ollama did not start. Log:"
          cat ollama.log
          exit 1
        }

    # ── 6. Pull selected local model & create custom context Modelfile ───────
    - name: Pull local model and apply custom context
      id: pull_local
      run: |
        INPUT_MODEL="${{ inputs.local_model }}"
        echo "Selected model from input: $INPUT_MODEL"

        echo "Pulling $INPUT_MODEL …"
        ollama pull "$INPUT_MODEL"

        # Build a safe name for the custom model.
        # Replace ':' with '-' so Ollama accepts it as a valid tag.
        # Example:  ornith:9b  →  ornith-9b-ctx32k
        SAFE_NAME=$(echo "$INPUT_MODEL" | tr ':' '-')
        CUSTOM_MODEL="${SAFE_NAME}-ctx32k"

        echo "Creating Modelfile for $CUSTOM_MODEL …"
        cat > Modelfile.custom << EOF
FROM $INPUT_MODEL
PARAMETER num_ctx ${{ env.NUM_CTX }}
PARAMETER temperature 0.7
PARAMETER num_predict 8192
EOF

        ollama create "$CUSTOM_MODEL" -f Modelfile.custom

        echo "✅ Custom model created: $CUSTOM_MODEL"

        # ── Write to GITHUB_ENV so later steps can use $MODEL_TO_USE ─────────
        echo "MODEL_TO_USE=$CUSTOM_MODEL" >> "$GITHUB_ENV"

    # ── 7. Verify local model responds ───────────────────────────────────────
    - name: Verify local model is responsive
      run: |
        # $MODEL_TO_USE is available as a shell variable because GitHub Actions
        # automatically exports values written to $GITHUB_ENV into each step's
        # shell environment.
        echo "Testing model: $MODEL_TO_USE"

        RESPONSE=$(curl -sf -X POST http://127.0.0.1:11434/api/chat \
          -H 'Content-Type: application/json' \
          -d "{
            \"model\": \"$MODEL_TO_USE\",
            \"messages\": [{\"role\": \"user\", \"content\": \"Reply with the single word: OK\"}],
            \"stream\": false
          }")

        if echo "$RESPONSE" | jq -e '.message.content' > /dev/null 2>&1; then
          echo "✅ Model $MODEL_TO_USE is responding."
          echo "   Response: $(echo "$RESPONSE" | jq -r '.message.content')"
        else
          echo "❌ Model $MODEL_TO_USE did not respond correctly."
          echo "   Raw response: $RESPONSE"
          exit 1
        fi

    # ── 8. Pull cloud models (optional) ─────────────────────────────────────
    - name: Pull cloud models
      if: inputs.use_cloud_models == 'true'
      run: |
        # These model tags come directly from https://ollama.com/search
        # If a pull fails the step continues — we track which ones succeeded
        # so we can conditionally include them in LiteLLM / OpenCode configs.

        CLOUD_MODELS=(
          "minimax-m3:cloud"
          "kimi-k2.7-code:cloud"
          "gemma4:12b"
          "gemma4:27b"
          "qwen3:32b"
          "glm-5.2:cloud"
        )

        PULLED_CLOUD=""
        for MODEL in "${CLOUD_MODELS[@]}"; do
          echo "Pulling $MODEL …"
          if ollama pull "$MODEL"; then
            echo "  ✅ $MODEL pulled."
            PULLED_CLOUD="$PULLED_CLOUD,$MODEL"
          else
            echo "  ⚠️  Could not pull $MODEL — skipping."
          fi
        done

        # Strip leading comma
        PULLED_CLOUD="${PULLED_CLOUD#,}"
        echo "PULLED_CLOUD_MODELS=$PULLED_CLOUD" >> "$GITHUB_ENV"
        echo "Successfully pulled cloud models: $PULLED_CLOUD"

    # Set an empty value when cloud models are disabled so later steps don't
    # have to guard for an unset variable.
    - name: Mark cloud models as disabled
      if: inputs.use_cloud_models != 'true'
      run: echo "PULLED_CLOUD_MODELS=" >> "$GITHUB_ENV"

    # ── 9. Install LiteLLM ───────────────────────────────────────────────────
    - name: Install LiteLLM
      run: pip install --quiet 'litellm[proxy]'

    # ── 10. Generate LiteLLM config ──────────────────────────────────────────
    - name: Generate LiteLLM config
      run: |
        # Generate a random master key at runtime (not from env: block)
        LITELLM_KEY="sk-ghactions-$(openssl rand -hex 16)"
        echo "LITELLM_KEY=$LITELLM_KEY" >> "$GITHUB_ENV"

        OLLAMA_BASE="${{ env.OLLAMA_BASE_URL }}"
        NUM_CTX="${{ env.NUM_CTX }}"

        # ── Local model entry ─────────────────────────────────────────────────
        cat > litellm_config.yaml << YAML
model_list:
  # ── Local model (selected via workflow dropdown) ──────────────────────────
  - model_name: ${MODEL_TO_USE}
    litellm_params:
      model: ollama_chat/${MODEL_TO_USE}
      api_base: ${OLLAMA_BASE}
      api_key: "ollama-local"
      num_ctx: ${NUM_CTX}
YAML

        # ── Cloud model entries (only those that were actually pulled) ─────────
        if [ -n "$PULLED_CLOUD_MODELS" ]; then
          IFS=',' read -ra CLOUD_LIST <<< "$PULLED_CLOUD_MODELS"
          for MODEL in "${CLOUD_LIST[@]}"; do
            # Derive a clean display name: replace ':' with '-'
            DISPLAY=$(echo "$MODEL" | tr ':' '-')
            cat >> litellm_config.yaml << YAML
  - model_name: ${DISPLAY}
    litellm_params:
      model: ollama_chat/${MODEL}
      api_base: ${OLLAMA_BASE}
      api_key: "ollama-cloud"
YAML
          done
        fi

        # ── General settings ──────────────────────────────────────────────────
        cat >> litellm_config.yaml << YAML

general_settings:
  master_key: "${LITELLM_KEY}"

litellm_settings:
  drop_params: true
  set_tool_choice_to_always: false
  telemetry: false
  request_timeout: 600
YAML

        echo "✅ litellm_config.yaml written:"
        cat litellm_config.yaml

    # ── 11. Start LiteLLM proxy ───────────────────────────────────────────────
    - name: Start LiteLLM proxy
      run: |
        litellm --config litellm_config.yaml \
          --port ${{ env.LITELLM_PORT }} \
          > litellm.log 2>&1 &

        echo "Waiting for LiteLLM on port ${{ env.LITELLM_PORT }} …"
        for i in $(seq 1 20); do
          if nc -z localhost ${{ env.LITELLM_PORT }} 2>/dev/null; then
            echo "✅ LiteLLM is up (attempt $i)."
            break
          fi
          echo "  attempt $i/20 — sleeping 3s..."
          sleep 3
        done

        nc -z localhost ${{ env.LITELLM_PORT }} || {
          echo "❌ LiteLLM failed to start. Log:"
          cat litellm.log
          exit 1
        }

    # ── 12. Validate LiteLLM model routes ────────────────────────────────────
    - name: Validate LiteLLM model routes
      run: |
        echo "Checking /v1/models …"
        MODELS_JSON=$(curl -sf \
          -H "Authorization: Bearer $LITELLM_KEY" \
          http://localhost:${{ env.LITELLM_PORT }}/v1/models)

        if [ -z "$MODELS_JSON" ]; then
          echo "❌ Could not reach LiteLLM /v1/models. Log:"
          cat litellm.log
          exit 1
        fi

        echo "✅ Models registered in LiteLLM:"
        echo "$MODELS_JSON" | jq -r '.data[].id'

        # Confirm the local model is present
        if echo "$MODELS_JSON" | jq -r '.data[].id' | grep -q "^${MODEL_TO_USE}$"; then
          echo "✅ Local model $MODEL_TO_USE confirmed in LiteLLM."
        else
          echo "⚠️  Local model $MODEL_TO_USE not found in LiteLLM model list."
          echo "   This may be a timing issue — proceeding anyway."
        fi

    # ── 13. Download cloudflared ──────────────────────────────────────────────
    - name: Download cloudflared
      run: |
        curl -fsSL \
          https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
          -o cloudflared
        chmod +x cloudflared

    # ── 14. Start Cloudflare tunnel ───────────────────────────────────────────
    - name: Start Cloudflare tunnel
      run: |
        ./cloudflared tunnel \
          --url http://localhost:${{ env.LITELLM_PORT }} \
          > cloudflare.log 2>&1 &

        echo "Waiting for Cloudflare tunnel URL …"
        TUNNEL_URL=""
        for i in $(seq 1 30); do
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' cloudflare.log 2>/dev/null | head -n1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "✅ Tunnel URL: $TUNNEL_URL"
            break
          fi
          echo "  attempt $i/30 — sleeping 3s..."
          sleep 3
        done

        if [ -z "$TUNNEL_URL" ]; then
          echo "❌ Failed to obtain Cloudflare tunnel URL. Log:"
          cat cloudflare.log
          exit 1
        fi

        echo "TUNNEL_URL=$TUNNEL_URL" >> "$GITHUB_ENV"

    # ── 15. Generate opencode_config.json ─────────────────────────────────────
    - name: Generate OpenCode config
      run: |
        TUNNEL="$TUNNEL_URL"
        KEY="$LITELLM_KEY"
        NUM_CTX="${{ env.NUM_CTX }}"

        # ── Build the "models" object dynamically ─────────────────────────────
        # Start with the local model
        MODELS_JSON=$(jq -n \
          --arg id "$MODEL_TO_USE" \
          --arg name "Local: $MODEL_TO_USE (32k ctx)" \
          --argjson ctx "$NUM_CTX" \
          '{
            ($id): {
              "id": $id,
              "name": $name,
              "tool_call": true,
              "temperature": true,
              "limit": {"context": $ctx, "output": 8192}
            }
          }')

        # Add cloud models if any were pulled
        if [ -n "$PULLED_CLOUD_MODELS" ]; then
          IFS=',' read -ra CLOUD_LIST <<< "$PULLED_CLOUD_MODELS"
          for MODEL in "${CLOUD_LIST[@]}"; do
            DISPLAY=$(echo "$MODEL" | tr ':' '-')
            MODELS_JSON=$(echo "$MODELS_JSON" | jq \
              --arg id "$DISPLAY" \
              --arg name "Cloud: $MODEL" \
              '. + {($id): {"id": $id, "name": $name, "tool_call": true, "temperature": true}}')
          done
        fi

        # ── Write final config ────────────────────────────────────────────────
        jq -n \
          --arg baseURL "$TUNNEL/v1" \
          --arg apiKey  "$KEY" \
          --arg defaultModel "github-backend/$MODEL_TO_USE" \
          --argjson models "$MODELS_JSON" \
          '{
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "github-backend": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "GitHub Actions LiteLLM Proxy",
                "options": {
                  "baseURL": $baseURL,
                  "apiKey":  $apiKey,
                  "timeout": 600000
                },
                "models": $models
              }
            },
            "model": $defaultModel,
            "note": "This tunnel is temporary. It closes when the GitHub Actions job ends (max ~6 hours)."
          }' > opencode_config.json

        echo "✅ opencode_config.json:"
        cat opencode_config.json

    # ── 16. Upload config as artifact ─────────────────────────────────────────
    - name: Upload OpenCode config artifact
      uses: actions/upload-artifact@v4
      with:
        name: opencode-config
        path: opencode_config.json

    # ── 17. Print deployment summary ──────────────────────────────────────────
    - name: Deployment summary
      run: |
        {
          echo "### ✅ Deployment Complete"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| **Tunnel URL** | \`$TUNNEL_URL/v1\` |"
          echo "| **API Key** | \`$LITELLM_KEY\` |"
          echo "| **Local Model** | \`$MODEL_TO_USE\` |"
          echo "| **Cloud Models** | \`$PULLED_CLOUD_MODELS\` |"
          echo ""
          echo "> ⚠️ Download the **opencode-config** artifact above and place it in your project root."
          echo "> The tunnel will close automatically when this job ends."
        } >> "$GITHUB_STEP_SUMMARY"

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  Tunnel URL : $TUNNEL_URL/v1"
        echo "  API Key    : $LITELLM_KEY"
        echo "  Local model: $MODEL_TO_USE"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ── 18. Keep-alive loop (up to ~5 h 45 min) ──────────────────────────────
    #
    # Prints a health status every 5 minutes.
    # If Ollama or LiteLLM dies, you'll see it in the live log immediately.
    # The job's timeout-minutes: 350 enforces the outer limit.
    - name: Keep alive — health monitor
      run: |
        echo "Entering keep-alive loop. The job will run for up to 350 minutes."
        echo "Health status is printed every 5 minutes."
        echo ""

        ITERATION=0
        while true; do
          sleep 300
          ITERATION=$((ITERATION + 1))
          ELAPSED_MIN=$((ITERATION * 5))

          OLLAMA_OK="✅"
          LITELLM_OK="✅"

          curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1 || OLLAMA_OK="❌ DOWN"
          nc -z localhost ${{ env.LITELLM_PORT }} 2>/dev/null          || LITELLM_OK="❌ DOWN"

          echo "[+${ELAPSED_MIN}m] Ollama: $OLLAMA_OK  |  LiteLLM: $LITELLM_OK  |  Tunnel: $TUNNEL_URL"

          # If either service died, print logs and exit so the failure is visible
          if [[ "$OLLAMA_OK" == *DOWN* ]]; then
            echo "Ollama log tail:"
            tail -30 ollama.log
            exit 1
          fi
          if [[ "$LITELLM_OK" == *DOWN* ]]; then
            echo "LiteLLM log tail:"
            tail -30 litellm.log
            exit 1
          fi
        done
