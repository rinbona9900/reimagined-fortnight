name: Deploy Ollama + Latest Models + Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      use_cloud_models:
        description: 'Enable cloud models (MiniMax, Kimi, GLM, etc.) alongside local models'
        required: false
        default: 'true'
      primary_local_model:
        description: 'Primary local model for fallback (e.g., lfm2.5, north-mini-code-1.0, ornith:9b)'
        required: false
        default: 'lfm2.5'

env:
  CLOUD_MODELS: "minimax-m3:cloud,kimi-k2.7-code:cloud,gemma4:12b,gemma4:27b,qwen3:32b,glm-5.2:cloud"
  PRIMARY_LOCAL: ${{ inputs.primary_local_model || 'lfm2.5' }}
  FALLBACK_LOCAL_1: 'north-mini-code-1.0'
  FALLBACK_LOCAL_2: 'ornith:9b'
  FALLBACK_LOCAL_3: 'phi4:14b'
  NUM_CTX: 32768
  OLLAMA_HOST: '127.0.0.1:11434'
  LITELLM_PORT: 4000

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y zstd curl lsof net-tools jq netcat-openbsd

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Configure Ollama environment
      run: |
        echo "OLLAMA_HOST=http://127.0.0.1:11434" >> $GITHUB_ENV
        echo "OLLAMA_NUM_CTX=${{ env.NUM_CTX }}" >> $GITHUB_ENV
        echo "OLLAMA_KEEP_ALIVE=30m" >> $GITHUB_ENV

    - name: Start Ollama service
      run: |
        sudo systemctl start ollama
        sleep 5
        sudo systemctl status ollama --no-pager

    - name: Pull Cloud Models
      if: inputs.use_cloud_models == 'true' || inputs.use_cloud_models == ''
      run: |
        IFS=',' read -ra MODELS <<< "${{ env.CLOUD_MODELS }}"
        for model in "${MODELS[@]}"; do
          echo "Pulling $model..."
          ollama pull "$model" || echo "Warning: Failed to pull $model"
        done

    - name: Pull Primary Local Model
      run: |
        echo "Pulling primary local model: ${{ env.PRIMARY_LOCAL }}"
        ollama pull "${{ env.PRIMARY_LOCAL }}"

    - name: Verify and Select Local Model
      id: select_model
      run: |
        MODEL_TO_USE=""
        TOOLS_JSON='{"type":"function","function":{"name":"get_weather","description":"Get weather","parameters":{"type":"object","properties":{"city":{"type":"string"}},"required":["city"]}}}'
        
        test_model() {
          local model=$1
          echo "Testing $model..."
          RESP=$(curl -s -X POST http://localhost:11434/api/chat \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$model\",\"messages\":[{\"role\":\"user\",\"content\":\"Weather in Paris?\"}],\"tools\":[$TOOLS_JSON],\"stream\":false}")
          if echo "$RESP" | jq -e '.message.tool_calls' > /dev/null 2>&1; then
            return 0
          fi
          return 1
        }

        if test_model "${{ env.PRIMARY_LOCAL }}"; then
          MODEL_TO_USE="${{ env.PRIMARY_LOCAL }}"
        elif { ollama pull "${{ env.FALLBACK_LOCAL_1 }}" && test_model "${{ env.FALLBACK_LOCAL_1 }}"; }; then
          MODEL_TO_USE="${{ env.FALLBACK_LOCAL_1 }}"
        elif { ollama pull "${{ env.FALLBACK_LOCAL_2 }}" && test_model "${{ env.FALLBACK_LOCAL_2 }}"; }; then
          MODEL_TO_USE="${{ env.FALLBACK_LOCAL_2 }}"
        elif { ollama pull "${{ env.FALLBACK_LOCAL_3 }}" && test_model "${{ env.FALLBACK_LOCAL_3 }}"; }; then
          MODEL_TO_USE="${{ env.FALLBACK_LOCAL_3 }}"
        else
          echo "All models failed tool support check"
          exit 1
        fi
        
        echo "MODEL_TO_USE=$MODEL_TO_USE" >> $GITHUB_ENV
        echo "Selected: $MODEL_TO_USE"

    - name: Install LiteLLM
      run: pip install litellm[proxy]

    - name: Generate LiteLLM Config
      run: |
        LITELLM_KEY="sk-gh-${RANDOM}-$(openssl rand -hex 8)"
        echo "LITELLM_KEY=$LITELLM_KEY" >> $GITHUB_ENV
        
        CLOUD_ENABLED="false"
        if [ "${{ inputs.use_cloud_models }}" == "true" ] || [ -z "${{ inputs.use_cloud_models }}" ]; then
          CLOUD_ENABLED="true"
        fi

        echo "model_list:" > litellm_config.yaml
        
        echo "  - model_name: ${MODEL_TO_USE}" >> litellm_config.yaml
        echo "    litellm_params:" >> litellm_config.yaml
        echo "      model: ollama_chat/${MODEL_TO_USE}" >> litellm_config.yaml
        echo "      api_base: http://${{ env.OLLAMA_HOST }}" >> litellm_config.yaml
        echo "      num_ctx: ${{ env.NUM_CTX }}" >> litellm_config.yaml
        echo "      api_key: ollama-local" >> litellm_config.yaml

        if [ "$CLOUD_ENABLED" == "true" ]; then
          echo "  - model_name: minimax-m3" >> litellm_config.yaml
          echo "    litellm_params:" >> litellm_config.yaml
          echo "      model: ollama_chat/minimax-m3:cloud" >> litellm_config.yaml
          echo "      api_base: http://localhost:11434" >> litellm_config.yaml
          echo "      api_key: ollama-cloud" >> litellm_config.yaml
          
          echo "  - model_name: kimi-k2.7-code" >> litellm_config.yaml
          echo "    litellm_params:" >> litellm_config.yaml
          echo "      model: ollama_chat/kimi-k2.7-code:cloud" >> litellm_config.yaml
          echo "      api_base: http://localhost:11434" >> litellm_config.yaml
          echo "      api_key: ollama-cloud" >> litellm_config.yaml
          
          echo "  - model_name: gemma4-12b" >> litellm_config.yaml
          echo "    litellm_params:" >> litellm_config.yaml
          echo "      model: ollama_chat/gemma4:12b" >> litellm_config.yaml
          echo "      api_base: http://localhost:11434" >> litellm_config.yaml
          echo "      api_key: ollama-cloud" >> litellm_config.yaml

          echo "  - model_name: qwen3-32b" >> litellm_config.yaml
          echo "    litellm_params:" >> litellm_config.yaml
          echo "      model: ollama_chat/qwen3:32b" >> litellm_config.yaml
          echo "      api_base: http://localhost:11434" >> litellm_config.yaml
          echo "      api_key: ollama-cloud" >> litellm_config.yaml
        fi

        echo "" >> litellm_config.yaml
        echo "general_settings:" >> litellm_config.yaml
        echo "  master_key: \"$LITELLM_KEY\"" >> litellm_config.yaml
        echo "" >> litellm_config.yaml
        echo "litellm_settings:" >> litellm_config.yaml
        echo "  drop_params: true" >> litellm_config.yaml
        echo "  request_timeout: 600" >> litellm_config.yaml

        cat litellm_config.yaml

    - name: Start LiteLLM Proxy
      run: |
        litellm --config litellm_config.yaml --port ${{ env.LITELLM_PORT }} &
        sleep 15
        if ! nc -z localhost ${{ env.LITELLM_PORT }}; then
          echo "LiteLLM failed to start"
          cat litellm.log 2>/dev/null || true
          exit 1
        fi
        echo "LiteLLM started on port ${{ env.LITELLM_PORT }}"

    - name: Download Cloudflared
      run: |
        curl -L --output cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared

    - name: Start Cloudflare Tunnel
      run: |
        ./cloudflared tunnel --url http://localhost:${{ env.LITELLM_PORT }} > cloudflare.log 2>&1 &
        sleep 15
        TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' cloudflare.log | head -n 1)
        if [ -z "$TUNNEL_URL" ]; then
          echo "Failed to get tunnel URL. Log contents:"
          cat cloudflare.log
          exit 1
        fi
        echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
        echo "Tunnel URL: $TUNNEL_URL"

    - name: Output Configuration
      run: |
        echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "- **Base URL**: ${{ env.TUNNEL_URL }}/v1" >> $GITHUB_STEP_SUMMARY
        echo "- **API Key**: ${{ env.LITELLM_KEY }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Local Model**: ${{ env.MODEL_TO_USE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Context**: ${{ env.NUM_CTX }}" >> $GITHUB_STEP_SUMMARY
        
        cat > opencode_config.json << ENDJSON
{
  "schema": "https://opencode.ai/config.json",
  "provider": {
    "github-backend": {
      "npm": "@ai-sdk/openai-compatible",
      "name": "GitHub-Ollama-Proxy",
      "options": {
        "baseURL": "${{ env.TUNNEL_URL }}/v1",
        "apiKey": "${{ env.LITELLM_KEY }}",
        "timeout": 600000
      },
      "models": {
        "${{ env.MODEL_TO_USE }}": {
          "id": "${{ env.MODEL_TO_USE }}",
          "name": "Local (${{ env.MODEL_TO_USE }})",
          "tool_call": true,
          "temperature": true,
          "limit": {"context": ${{ env.NUM_CTX }}, "output": 8192}
        },
        "minimax-m3": {
          "id": "minimax-m3",
          "name": "MiniMax M3 (Cloud)",
          "tool_call": true,
          "temperature": true
        },
        "kimi-k2.7-code": {
          "id": "kimi-k2.7-code",
          "name": "Kimi K2.7 Code (Cloud)",
          "tool_call": true,
          "temperature": true
        },
        "gemma4-12b": {
          "id": "gemma4-12b",
          "name": "Gemma 4 12B (Cloud)",
          "tool_call": true,
          "temperature": true
        },
        "qwen3-32b": {
          "id": "qwen3-32b",
          "name": "Qwen 3 32B (Cloud)",
          "tool_call": true,
          "temperature": true
        }
      }
    }
  },
  "model": "github-backend/${{ env.MODEL_TO_USE }}"
}
ENDJSON
        cat opencode_config.json

    - name: Upload Config Artifact
      uses: actions/upload-artifact@v4
      with:
        name: opencode-config
        path: opencode_config.json

    - name: Keep Alive
      run: |
        echo "Services running. Waiting..."
        sleep 300
