name: Deploy Ollama + LiteLLM + Cloudflare Tunnel

# HOW THIS WORKS
# 1. Installs Ollama on the GitHub-hosted runner.
# 2. Pulls the ONE local model selected from the dropdown.
# 3. Creates a custom Modelfile to enforce num_ctx at inference time.
# 4. Optionally pulls ALL cloud models from the Ollama registry.
# 5. Starts LiteLLM as an OpenAI-compatible proxy in front of Ollama.
# 6. Opens a Cloudflare Quick Tunnel so LiteLLM is reachable remotely.
# 7. Generates opencode_config.json listing every successfully pulled model.
# 8. Stays alive up to ~5h50m, printing health status every 5 minutes.
#
# MODEL CLASSIFICATION (from ollama.com/search):
#   CLOUD  - served remotely, no GPU needed on runner, pulled with :cloud tag
#     glm-5.2:cloud          976K ctx
#     minimax-m3:cloud       512K ctx
#     kimi-k2.7-code:cloud   256K ctx
#     nemotron-3-ultra:cloud 256K ctx
#     nemotron-3-super:cloud 256K ctx (120B MoE)
#     gemma4:e2b             cloud variant
#     gemma4:e4b             cloud variant
#
#   LOCAL  - run on the runner CPU/RAM (choose one via dropdown)
#     lfm2.5                 8B,  fast tool calling
#     north-mini-code-1.0    30B MoE, 3B active, coding
#     ornith:9b              9B,  256K ctx, coding
#     gemma4:12b             12B, local size
#     gemma4:26b             26B, local size
#     qwen3.6:27b            27B, vision+tools
#     qwen3.6:35b            35B, vision+tools
#
# ENV VARIABLE STRATEGY
#   ${{ env.VAR }}  -> safe only for top-level env: block (evaluated at parse time)
#   $VAR            -> use for anything written to $GITHUB_ENV at runtime
#   NEVER use ${{ env.VAR }} for a value set by a previous step - it will be empty.

on:
  workflow_dispatch:
    inputs:

      local_model:
        description: 'Local model to run on the runner (pick based on RAM available ~7GB)'
        required: true
        type: choice
        options:
          - lfm2.5
          - north-mini-code-1.0
          - ornith:9b
          - gemma4:12b
          - gemma4:26b
          - qwen3.6:27b
          - qwen3.6:35b
        default: lfm2.5

      use_cloud_models:
        description: 'Also pull all cloud models (glm-5.2, minimax-m3, kimi-k2.7, nemotron, gemma4 cloud)'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

env:
  OLLAMA_BASE_URL: 'http://127.0.0.1:11434'
  LITELLM_PORT: '4000'
  NUM_CTX: '32768'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y curl jq netcat-openbsd openssl

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Ollama
      run: curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama service
      run: |
        OLLAMA_HOST=0.0.0.0:11434 ollama serve > ollama.log 2>&1 &
        echo "Waiting for Ollama..."
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then
            echo "Ollama ready (attempt $i)."
            break
          fi
          echo "  attempt $i/30 - sleeping 3s..."
          sleep 3
        done
        curl -sf http://127.0.0.1:11434/api/tags > /dev/null || {
          echo "ERROR: Ollama did not start."
          cat ollama.log
          exit 1
        }

    # We use printf instead of heredocs to write the Modelfile.
    # Heredoc bodies at column 0 break the GitHub Actions YAML parser.
    - name: Pull local model and apply custom context
      run: |
        INPUT_MODEL="${{ inputs.local_model }}"
        CTX_SIZE="${{ env.NUM_CTX }}"

        echo "Pulling local model: $INPUT_MODEL"
        ollama pull "$INPUT_MODEL"

        # Build a safe model name with no colons: ornith:9b -> ornith-9b-ctx32k
        SAFE_NAME=$(echo "$INPUT_MODEL" | tr ':' '-')
        CUSTOM_MODEL="${SAFE_NAME}-ctx32k"

        echo "Creating Modelfile for $CUSTOM_MODEL ..."
        printf 'FROM %s\nPARAMETER num_ctx %s\nPARAMETER temperature 0.7\nPARAMETER num_predict 8192\n' \
          "$INPUT_MODEL" "$CTX_SIZE" > Modelfile.custom

        echo "Modelfile contents:"
        cat Modelfile.custom

        ollama create "$CUSTOM_MODEL" -f Modelfile.custom
        echo "Custom model created: $CUSTOM_MODEL"

        echo "MODEL_TO_USE=$CUSTOM_MODEL" >> "$GITHUB_ENV"

    - name: Verify local model is responsive
      run: |
        echo "Testing model: $MODEL_TO_USE"
        RESPONSE=$(curl -sf -X POST http://127.0.0.1:11434/api/chat \
          -H 'Content-Type: application/json' \
          -d "{
            \"model\": \"$MODEL_TO_USE\",
            \"messages\": [{\"role\": \"user\", \"content\": \"Reply with the single word: OK\"}],
            \"stream\": false
          }")
        if echo "$RESPONSE" | jq -e '.message.content' > /dev/null 2>&1; then
          echo "Model $MODEL_TO_USE is responding."
          echo "Reply: $(echo "$RESPONSE" | jq -r '.message.content')"
        else
          echo "ERROR: Model $MODEL_TO_USE did not respond."
          echo "Raw: $RESPONSE"
          exit 1
        fi

    # Cloud models are pulled one by one. Failures are logged but do not abort
    # the workflow. Only models that actually pulled successfully are registered
    # in LiteLLM and written to opencode_config.json.
    - name: Pull cloud models
      if: inputs.use_cloud_models == 'true'
      run: |
        CLOUD_MODELS=(
          "glm-5.2:cloud"
          "minimax-m3:cloud"
          "kimi-k2.7-code:cloud"
          "nemotron-3-ultra:cloud"
          "nemotron-3-super:cloud"
          "gemma4:e2b"
          "gemma4:e4b"
        )
        PULLED_CLOUD=""
        for CM in "${CLOUD_MODELS[@]}"; do
          echo "Pulling $CM ..."
          if ollama pull "$CM"; then
            echo "  OK: $CM"
            PULLED_CLOUD="${PULLED_CLOUD},${CM}"
          else
            echo "  SKIP: $CM (pull failed - will not be added to config)"
          fi
        done
        PULLED_CLOUD="${PULLED_CLOUD#,}"
        echo "PULLED_CLOUD_MODELS=$PULLED_CLOUD" >> "$GITHUB_ENV"
        echo "Successfully pulled cloud models: $PULLED_CLOUD"

    - name: Mark cloud models as disabled
      if: inputs.use_cloud_models != 'true'
      run: echo "PULLED_CLOUD_MODELS=" >> "$GITHUB_ENV"

    - name: Install LiteLLM
      run: pip install --quiet 'litellm[proxy]'

    # Generate litellm_config.yaml with printf only (no heredocs).
    - name: Generate LiteLLM config
      run: |
        LITELLM_KEY="sk-ghactions-$(openssl rand -hex 16)"
        echo "LITELLM_KEY=$LITELLM_KEY" >> "$GITHUB_ENV"

        OLLAMA_BASE="${{ env.OLLAMA_BASE_URL }}"
        CTX_SIZE="${{ env.NUM_CTX }}"

        {
          printf 'model_list:\n'
          printf '  - model_name: %s\n' "$MODEL_TO_USE"
          printf '    litellm_params:\n'
          printf '      model: ollama_chat/%s\n' "$MODEL_TO_USE"
          printf '      api_base: %s\n' "$OLLAMA_BASE"
          printf '      api_key: "ollama-local"\n'
          printf '      num_ctx: %s\n' "$CTX_SIZE"
        } > litellm_config.yaml

        if [ -n "$PULLED_CLOUD_MODELS" ]; then
          IFS=',' read -ra CLOUD_LIST <<< "$PULLED_CLOUD_MODELS"
          for CM in "${CLOUD_LIST[@]}"; do
            DISPLAY=$(echo "$CM" | tr ':' '-')
            {
              printf '  - model_name: %s\n' "$DISPLAY"
              printf '    litellm_params:\n'
              printf '      model: ollama_chat/%s\n' "$CM"
              printf '      api_base: %s\n' "$OLLAMA_BASE"
              printf '      api_key: "ollama-cloud"\n'
            } >> litellm_config.yaml
          done
        fi

        {
          printf '\ngeneral_settings:\n'
          printf '  master_key: "%s"\n' "$LITELLM_KEY"
          printf '\nlitellm_settings:\n'
          printf '  drop_params: true\n'
          printf '  set_tool_choice_to_always: false\n'
          printf '  telemetry: false\n'
          printf '  request_timeout: 600\n'
        } >> litellm_config.yaml

        echo "litellm_config.yaml:"
        cat litellm_config.yaml

    - name: Start LiteLLM proxy
      run: |
        PORT="${{ env.LITELLM_PORT }}"
        litellm --config litellm_config.yaml --port "$PORT" > litellm.log 2>&1 &
        echo "Waiting for LiteLLM on port $PORT ..."
        for i in $(seq 1 20); do
          if nc -z localhost "$PORT" 2>/dev/null; then
            echo "LiteLLM is up (attempt $i)."
            break
          fi
          echo "  attempt $i/20 - sleeping 3s..."
          sleep 3
        done
        nc -z localhost "$PORT" || {
          echo "ERROR: LiteLLM failed to start."
          cat litellm.log
          exit 1
        }

    - name: Validate LiteLLM model routes
      run: |
        PORT="${{ env.LITELLM_PORT }}"
        echo "Checking /v1/models ..."
        MODELS_JSON=$(curl -sf \
          -H "Authorization: Bearer $LITELLM_KEY" \
          "http://localhost:${PORT}/v1/models")
        if [ -z "$MODELS_JSON" ]; then
          echo "ERROR: Could not reach /v1/models."
          cat litellm.log
          exit 1
        fi
        echo "Models registered in LiteLLM:"
        echo "$MODELS_JSON" | jq -r '.data[].id'
        if echo "$MODELS_JSON" | jq -r '.data[].id' | grep -qF "$MODEL_TO_USE"; then
          echo "Local model $MODEL_TO_USE confirmed."
        else
          echo "WARNING: $MODEL_TO_USE not found in model list. Proceeding anyway."
        fi

    - name: Download cloudflared
      run: |
        curl -fsSL \
          https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
          -o cloudflared
        chmod +x cloudflared

    - name: Start Cloudflare tunnel
      run: |
        PORT="${{ env.LITELLM_PORT }}"
        ./cloudflared tunnel --url "http://localhost:${PORT}" > cloudflare.log 2>&1 &
        echo "Waiting for tunnel URL ..."
        TUNNEL_URL=""
        for i in $(seq 1 30); do
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' cloudflare.log 2>/dev/null | head -n1)
          if [ -n "$TUNNEL_URL" ]; then
            echo "Tunnel: $TUNNEL_URL"
            break
          fi
          echo "  attempt $i/30 - sleeping 3s..."
          sleep 3
        done
        if [ -z "$TUNNEL_URL" ]; then
          echo "ERROR: No tunnel URL found."
          cat cloudflare.log
          exit 1
        fi
        echo "TUNNEL_URL=$TUNNEL_URL" >> "$GITHUB_ENV"

    # opencode_config.json is built entirely with jq.
    # KEY FIXES vs previous version:
    #   1. "note" key removed - OpenCode schema does not allow it (caused the error)
    #   2. Cloud model context limits added correctly per model
    #   3. Model IDs match exactly what LiteLLM registered (display names from tr ':' '-')
    #   4. No unrecognized keys anywhere in the schema
    - name: Generate OpenCode config
      run: |
        CTX_SIZE="${{ env.NUM_CTX }}"

        # Start with the local model
        MODELS_JSON=$(jq -n \
          --arg id   "$MODEL_TO_USE" \
          --arg name "Local: $MODEL_TO_USE" \
          --argjson ctx "$CTX_SIZE" \
          '{
            ($id): {
              "id":          $id,
              "name":        $name,
              "tool_call":   true,
              "temperature": true,
              "limit":       {"context": $ctx, "output": 8192}
            }
          }')

        # Add each successfully pulled cloud model with correct context limits
        if [ -n "$PULLED_CLOUD_MODELS" ]; then
          IFS=',' read -ra CLOUD_LIST <<< "$PULLED_CLOUD_MODELS"
          for CM in "${CLOUD_LIST[@]}"; do
            DISPLAY=$(echo "$CM" | tr ':' '-')

            # Set context limit per model based on ollama.com specs
            case "$CM" in
              "glm-5.2:cloud")           CTX_LIMIT=976000  ;;
              "minimax-m3:cloud")        CTX_LIMIT=512000  ;;
              "kimi-k2.7-code:cloud")    CTX_LIMIT=256000  ;;
              "nemotron-3-ultra:cloud")  CTX_LIMIT=256000  ;;
              "nemotron-3-super:cloud")  CTX_LIMIT=256000  ;;
              "gemma4:e2b")              CTX_LIMIT=128000  ;;
              "gemma4:e4b")              CTX_LIMIT=128000  ;;
              *)                         CTX_LIMIT=32768   ;;
            esac

            MODELS_JSON=$(echo "$MODELS_JSON" | jq \
              --arg  id    "$DISPLAY" \
              --arg  name  "Cloud: $CM" \
              --argjson ctx "$CTX_LIMIT" \
              '. + {
                ($id): {
                  "id":          $id,
                  "name":        $name,
                  "tool_call":   true,
                  "temperature": true,
                  "limit":       {"context": $ctx, "output": 8192}
                }
              }')
          done
        fi

        # Write final config - only keys that OpenCode schema accepts
        jq -n \
          --arg baseURL      "$TUNNEL_URL/v1" \
          --arg apiKey       "$LITELLM_KEY" \
          --arg defaultModel "github-backend/$MODEL_TO_USE" \
          --argjson models   "$MODELS_JSON" \
          '{
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "github-backend": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "GitHub Actions LiteLLM Proxy",
                "options": {
                  "baseURL": $baseURL,
                  "apiKey":  $apiKey,
                  "timeout": 600000
                },
                "models": $models
              }
            },
            "model": $defaultModel
          }' > opencode_config.json

        echo "opencode_config.json:"
        cat opencode_config.json

        # Sanity check: confirm the JSON is valid
        jq empty opencode_config.json && echo "JSON is valid." || {
          echo "ERROR: Generated JSON is invalid."
          exit 1
        }

    - name: Upload OpenCode config artifact
      uses: actions/upload-artifact@v4
      with:
        name: opencode-config
        path: opencode_config.json

    - name: Deployment summary
      run: |
        {
          echo "### Deployment Complete"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Tunnel URL | \`${TUNNEL_URL}/v1\` |"
          echo "| API Key | \`${LITELLM_KEY}\` |"
          echo "| Local Model | \`${MODEL_TO_USE}\` |"
          echo "| Cloud Models | \`${PULLED_CLOUD_MODELS:-none}\` |"
          echo ""
          echo "> Download the **opencode-config** artifact and place it at:"
          echo "> - Windows: \`C:\\Users\\<you>\\.opencode\\opencode.json\`"
          echo "> - Mac/Linux: \`~/.opencode/opencode.json\`"
          echo "> The tunnel closes automatically when this job ends."
        } >> "$GITHUB_STEP_SUMMARY"

        echo "============================================"
        echo "  Tunnel URL : ${TUNNEL_URL}/v1"
        echo "  API Key    : ${LITELLM_KEY}"
        echo "  Local model: ${MODEL_TO_USE}"
        echo "============================================"

    - name: Keep alive - health monitor
      run: |
        PORT="${{ env.LITELLM_PORT }}"
        echo "Keep-alive started. Job runs up to 350 minutes."
        echo "Health status printed every 5 minutes."

        ITER=0
        while true; do
          sleep 300
          ITER=$((ITER + 1))
          ELAPSED=$((ITER * 5))

          OLLAMA_STATUS="OK"
          LITELLM_STATUS="OK"

          curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1 || OLLAMA_STATUS="DOWN"
          nc -z localhost "$PORT" 2>/dev/null || LITELLM_STATUS="DOWN"

          echo "[+${ELAPSED}m] Ollama: ${OLLAMA_STATUS}  LiteLLM: ${LITELLM_STATUS}  Tunnel: ${TUNNEL_URL}"

          if [ "$OLLAMA_STATUS" = "DOWN" ]; then
            echo "ERROR: Ollama is down."
            tail -30 ollama.log
            exit 1
          fi
          if [ "$LITELLM_STATUS" = "DOWN" ]; then
            echo "ERROR: LiteLLM is down."
            tail -30 litellm.log
            exit 1
          fi
        done
