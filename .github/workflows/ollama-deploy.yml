name: Deploy Ollama + LiteLLM + Cloudflare Tunnel (Enhanced v3)

# ============================================================================
# VERSION: 3  (look for this comment in your repo's deploy.yml to confirm
#              you have the latest version)
#
# WHAT THIS DOES
#   1. Installs Ollama on the GitHub-hosted runner.
#   2. Pulls ONE local model (dropdown), creates a custom Modelfile variant.
#   3. Optionally pulls Ollama :cloud models (auth via OLLAMA_CLOUD_API_KEY
#      secret stored at ~/.ollama/.ollama/credentials as JSON).
#   4. Starts LiteLLM as an OpenAI-compatible proxy.
#   5. Smoke-tests EVERY registered model via real /v1/chat/completions.
#      Only models that actually respond end up in opencode_config.json.
#   6. Opens a Cloudflare Quick Tunnel.
#   7. Generates opencode_config.json with per-model capability flags.
#   8. Keep-alive up to ~5h50m with health probes.
#
# CLOUD SETUP (only if use_cloud_models=true)
#   Repo Settings -> Secrets and variables -> Actions -> New repository secret
#     Name : OLLAMA_CLOUD_API_KEY
#     Value: your ollama.com cloud key
# ============================================================================

on:
  workflow_dispatch:
    inputs:

      local_model:
        description: 'Local model to run on the runner'
        required: true
        type: choice
        options:
          - lfm2.5
          - north-mini-code-1.0
          - ornith:9b
          - gemma4:e2b
          - gemma4:e4b
          - gemma4:12b
          - gemma4:26b
          - qwen3.6:27b
          - qwen3.6:35b
        default: lfm2.5

      use_cloud_models:
        description: 'Pull Ollama :cloud models (requires OLLAMA_CLOUD_API_KEY secret)'
        required: false
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

env:
  OLLAMA_BASE_URL: 'http://127.0.0.1:11434'
  LITELLM_PORT: '4000'
  NUM_CTX: '16384'
  NUM_PREDICT: '4096'
  REQUEST_TIMEOUT: '600'
  PULL_RETRY: '2'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y curl jq netcat-openbsd openssl ca-certificates

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ------------------------------------------------------------------------
    # OLLAMA CLOUD CREDENTIALS
    # File path: ~/.ollama/.ollama/credentials
    # Format   : {"token": "..."}   (JSON, NOT a raw string)
    # ------------------------------------------------------------------------
    - name: Configure Ollama Cloud credentials
      if: inputs.use_cloud_models == 'true'
      env:
        CLOUD_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
      run: |
        set +e   # never abort this step on a curl/file error
        if [ -z "$CLOUD_KEY" ]; then
          echo "::error::use_cloud_models=true but OLLAMA_CLOUD_API_KEY secret is not set."
          echo "Add it at: Settings -> Secrets and variables -> Actions -> New repository secret"
          exit 1
        fi
        mkdir -p "$HOME/.ollama/.ollama"
        printf '%s' "{\"token\":\"$CLOUD_KEY\"}" > "$HOME/.ollama/.ollama/credentials"
        chmod 600 "$HOME/.ollama/.ollama/credentials"
        echo "Wrote credentials to $HOME/.ollama/.ollama/credentials"
        ls -la "$HOME/.ollama/.ollama/"
        echo "Content (masked): $(head -c 60 "$HOME/.ollama/.ollama/credentials")..."
        echo "Ollama Cloud credentials installed."

    - name: Install Ollama
      run: |
        set +e
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama service
      run: |
        set +e
        export OLLAMA_HOST=0.0.0.0:11434
        nohup ollama serve > ollama.log 2>&1 &
        for i in $(seq 1 30); do
          curl -s -o /dev/null -w '' http://127.0.0.1:11434/api/tags
          if curl -s -o /dev/null http://127.0.0.1:11434/api/tags 2>/dev/null; then
            echo "Ollama ready (attempt $i)."
            break
          fi
          sleep 3
        done
        if ! curl -s -o /dev/null http://127.0.0.1:11434/api/tags 2>/dev/null; then
          echo "ERROR: Ollama did not start."
          tail -50 ollama.log
          exit 1
        fi

    # ------------------------------------------------------------------------
    # LOCAL MODEL: pull -> custom Modelfile -> direct smoke test
    # ------------------------------------------------------------------------
    - name: Pull local model and create custom variant
      id: local_pull
      run: |
        set +e
        INPUT_MODEL="${{ inputs.local_model }}"
        CTX_SIZE="${{ env.NUM_CTX }}"
        PRED_SIZE="${{ env.NUM_PREDICT }}"

        echo "Pulling local model: $INPUT_MODEL"
        ollama pull "$INPUT_MODEL" 2>&1 | tail -10
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "ERROR: ollama pull failed for $INPUT_MODEL"
          exit 1
        fi

        SAFE_NAME=$(echo "$INPUT_MODEL" | tr ':/' '-')
        CUSTOM_MODEL="${SAFE_NAME}-ctx${CTX_SIZE}"

        printf 'FROM %s\nPARAMETER num_ctx %s\nPARAMETER temperature 0.7\nPARAMETER num_predict %s\n' \
          "$INPUT_MODEL" "$CTX_SIZE" "$PRED_SIZE" > Modelfile.custom

        echo "Modelfile:"
        cat Modelfile.custom

        ollama create "$CUSTOM_MODEL" -f Modelfile.custom 2>&1 | tail -5
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "ERROR: ollama create failed for $CUSTOM_MODEL"
          exit 1
        fi

        echo "MODEL_TO_USE=$CUSTOM_MODEL" >> "$GITHUB_ENV"
        echo "LOCAL_BASE_MODEL=$INPUT_MODEL" >> "$GITHUB_ENV"

    - name: Smoke test local model (direct Ollama)
      run: |
        set +e
        HTTP=$(curl -s -o /tmp/lt.body -w '%{http_code}' --max-time 180 \
          -X POST http://127.0.0.1:11434/api/chat \
          -H 'Content-Type: application/json' \
          -d "{\"model\":\"$MODEL_TO_USE\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with the single word: OK\"}],\"stream\":false}")
        BODY=$(cat /tmp/lt.body 2>/dev/null)
        echo "Direct Ollama HTTP=$HTTP"
        echo "Body: $(echo "$BODY" | head -c 300)"
        if [ "$HTTP" = "200" ] && echo "$BODY" | jq -e '.message.content' >/dev/null 2>&1; then
          echo "Local direct OK: $(echo "$BODY" | jq -r '.message.content')"
        else
          echo "ERROR: direct Ollama call to $MODEL_TO_USE failed."
          tail -50 ollama.log
          exit 1
        fi

    # ------------------------------------------------------------------------
    # CLOUD MODELS: pull each, verify presence, retry.
    # ------------------------------------------------------------------------
    - name: Pull Ollama Cloud models
      if: inputs.use_cloud_models == 'true'
      id: cloud_pull
      env:
        RETRIES: ${{ env.PULL_RETRY }}
      run: |
        set +e
        CLOUD_MODELS=(
          "glm-5.2:cloud"
          "minimax-m3:cloud"
          "kimi-k2.7-code:cloud"
          "nemotron-3-ultra:cloud"
          "nemotron-3-super:cloud"
        )
        PULLED=""
        FAILED=""
        for CM in "${CLOUD_MODELS[@]}"; do
          OK=0
          for attempt in $(seq 1 "$RETRIES"); do
            echo "Pulling $CM (attempt $attempt/$RETRIES)..."
            ollama pull "$CM" 2>&1 | tail -3
            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              if ollama list 2>/dev/null | awk 'NR>1 {print $1}' | grep -qxF "$CM"; then
                OK=1
                break
              fi
            fi
            sleep 5
          done
          if [ "$OK" = "1" ]; then
            echo "  OK: $CM"
            PULLED="${PULLED:+$PULLED,}$CM"
          else
            echo "  FAIL: $CM"
            FAILED="${FAILED:+$FAILED,}$CM"
          fi
        done
        echo "PULLED_CLOUD_MODELS=$PULLED" >> "$GITHUB_ENV"
        echo "FAILED_CLOUD_MODELS=$FAILED" >> "$GITHUB_ENV"
        echo "Pulled: $PULLED"
        echo "Failed: ${FAILED:-none}"

    - name: Skip cloud models marker
      if: inputs.use_cloud_models != 'true'
      run: |
        echo "PULLED_CLOUD_MODELS=" >> "$GITHUB_ENV"
        echo "FAILED_CLOUD_MODELS=" >> "$GITHUB_ENV"
        echo "Cloud models disabled."

    # ------------------------------------------------------------------------
    # LITELLM
    # ------------------------------------------------------------------------
    - name: Install LiteLLM
      run: |
        set +e
        pip install --quiet --upgrade 'litellm[proxy]' 2>&1 | tail -5

    - name: Generate LiteLLM config
      run: |
        set +e
        LITELLM_KEY="sk-ghactions-$(openssl rand -hex 16)"
        echo "LITELLM_KEY=$LITELLM_KEY" >> "$GITHUB_ENV"

        OLLAMA_BASE="${{ env.OLLAMA_BASE_URL }}"
        CTX_SIZE="${{ env.NUM_CTX }}"
        PRED_SIZE="${{ env.NUM_PREDICT }}"
        TIMEOUT="${{ env.REQUEST_TIMEOUT }}"

        {
          printf 'model_list:\n'
          printf '  - model_name: %s\n' "$MODEL_TO_USE"
          printf '    litellm_params:\n'
          printf '      model: ollama_chat/%s\n' "$MODEL_TO_USE"
          printf '      api_base: %s\n' "$OLLAMA_BASE"
          printf '      api_key: "ollama"\n'
          printf '      num_ctx: %s\n' "$CTX_SIZE"
        } > litellm_config.yaml

        if [ -n "$PULLED_CLOUD_MODELS" ]; then
          IFS=',' read -ra CLOUD_LIST <<< "$PULLED_CLOUD_MODELS"
          for CM in "${CLOUD_LIST[@]}"; do
            DISPLAY=$(echo "$CM" | tr ':' '-')
            case "$CM" in
              "glm-5.2:cloud")          CTX_LIMIT=976000 ;;
              "minimax-m3:cloud")       CTX_LIMIT=512000 ;;
              "kimi-k2.7-code:cloud")   CTX_LIMIT=256000 ;;
              "nemotron-3-ultra:cloud") CTX_LIMIT=256000 ;;
              "nemotron-3-super:cloud") CTX_LIMIT=256000 ;;
              *)                        CTX_LIMIT=128000 ;;
            esac
            {
              printf '  - model_name: %s\n' "$DISPLAY"
              printf '    litellm_params:\n'
              printf '      model: ollama_chat/%s\n' "$CM"
              printf '      api_base: %s\n' "$OLLAMA_BASE"
              printf '      api_key: "ollama"\n'
              printf '      num_ctx: %s\n' "$CTX_LIMIT"
            } >> litellm_config.yaml
          done
        fi

        {
          printf '\ngeneral_settings:\n'
          printf '  master_key: "%s"\n' "$LITELLM_KEY"
          printf '\nlitellm_settings:\n'
          printf '  drop_params: true\n'
          printf '  set_tool_choice_to_always: false\n'
          printf '  telemetry: false\n'
          printf '  request_timeout: %s\n' "$TIMEOUT"
          printf '  stream_timeout: %s\n' "$TIMEOUT"
        } >> litellm_config.yaml

        echo "==== litellm_config.yaml ===="
        cat litellm_config.yaml

    - name: Start LiteLLM proxy
      run: |
        set +e
        PORT="${{ env.LITELLM_PORT }}"
        nohup litellm --config litellm_config.yaml --port "$PORT" > litellm.log 2>&1 &
        for i in $(seq 1 30); do
          if nc -z localhost "$PORT" 2>/dev/null; then
            echo "LiteLLM up (attempt $i)."
            break
          fi
          sleep 3
        done
        if ! nc -z localhost "$PORT" 2>/dev/null; then
          echo "ERROR: LiteLLM failed to start."
          tail -80 litellm.log
          exit 1
        fi

    # ------------------------------------------------------------------------
    # SMOKE TEST EVERY MODEL THROUGH LITELLM
    # - NO curl -f anywhere (eliminates exit 22 propagation).
    # - Captures HTTP code + body separately so failures are logged, not fatal.
    # - Continues through every model regardless of individual failures.
    # ------------------------------------------------------------------------
    - name: Smoke test every registered model through LiteLLM
      id: validate
      run: |
        set +e
        PORT="${{ env.LITELLM_PORT }}"

        # Get declared model list (no -f, capture code + body)
        HC=$(curl -s -o /tmp/models.body -w '%{http_code}' --max-time 60 \
          -H "Authorization: Bearer $LITELLM_KEY" \
          "http://localhost:${PORT}/v1/models")
        MODELS_BODY=$(cat /tmp/models.body 2>/dev/null)

        if [ "$HC" != "200" ]; then
          echo "ERROR: /v1/models returned HTTP $HC"
          echo "body: $(echo "$MODELS_BODY" | head -c 400)"
          tail -80 litellm.log
          exit 1
        fi

        DECLARED=$(echo "$MODELS_BODY" | jq -r '.data[].id' 2>/dev/null)
        if [ -z "$DECLARED" ]; then
          echo "ERROR: /v1/models returned no models"
          echo "body: $(echo "$MODELS_BODY" | head -c 400)"
          tail -80 litellm.log
          exit 1
        fi
        echo "Declared by LiteLLM:"
        echo "$DECLARED" | sed 's/^/  /'

        WORKING=""
        BROKEN=""
        for M in $DECLARED; do
          echo ""
          echo "Probing $M ..."
          HTTP=$(curl -s -o /tmp/probe.body -w '%{http_code}' --max-time 240 \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Content-Type: application/json" \
            -X POST "http://localhost:${PORT}/v1/chat/completions" \
            -d "{\"model\":\"$M\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with the single word: OK\"}],\"max_tokens\":50,\"stream\":false}")
          RESP=$(cat /tmp/probe.body 2>/dev/null)

          if [ "$HTTP" = "200" ] \
             && echo "$RESP" | jq -e '.choices[0].message.content' > /dev/null 2>&1; then
            CONTENT=$(echo "$RESP" | jq -r '.choices[0].message.content' | tr -d '\r\n[:space:]')
            if [ -n "$CONTENT" ] && [ "$CONTENT" != "null" ] && [ "$CONTENT" != "<none>" ]; then
              echo "  OK   $M  -> \"$CONTENT\""
              WORKING="${WORKING:+$WORKING,}$M"
              continue
            fi
          fi

          echo "  FAIL $M  (HTTP ${HTTP:-?})"
          BODY_PREVIEW=$(echo "$RESP" | head -c 400 | tr '\n' ' ')
          echo "    body: $BODY_PREVIEW"
          BROKEN="${BROKEN:+$BROKEN,}$M"
        done

        echo ""
        echo "WORKING_MODELS=$WORKING" >> "$GITHUB_ENV"
        echo "BROKEN_MODELS=$BROKEN" >> "$GITHUB_ENV"
        echo "Working: $WORKING"
        echo "Broken : ${BROKEN:-none}"

        if [ -z "$WORKING" ]; then
          echo "::error::No model returned a usable response through LiteLLM."
          tail -120 litellm.log
          exit 1
        fi

    # ------------------------------------------------------------------------
    # CLOUDFLARE TUNNEL
    # ------------------------------------------------------------------------
    - name: Download cloudflared
      run: |
        set +e
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared

    - name: Start Cloudflare tunnel
      run: |
        set +e
        PORT="${{ env.LITELLM_PORT }}"
        nohup ./cloudflared tunnel --url "http://localhost:${PORT}" > cloudflare.log 2>&1 &
        TUNNEL_URL=""
        for i in $(seq 1 30); do
          TUNNEL_URL=$(grep -o 'https://[^ ]*trycloudflare\.com' cloudflare.log 2>/dev/null | head -n1)
          [ -n "$TUNNEL_URL" ] && break
          sleep 3
        done
        if [ -z "$TUNNEL_URL" ]; then
          echo "ERROR: No tunnel URL."
          tail -50 cloudflare.log
          exit 1
        fi
        echo "Tunnel: $TUNNEL_URL"
        echo "TUNNEL_URL=$TUNNEL_URL" >> "$GITHUB_ENV"

    # ------------------------------------------------------------------------
    # OPENCODE CONFIG
    # Only WORKING models appear here. Capabilities per model.
    # ------------------------------------------------------------------------
    - name: Generate OpenCode config
      run: |
        set +e
        CTX_SIZE="${{ env.NUM_CTX }}"
        PRED_SIZE="${{ env.NUM_PREDICT }}"

        cap_for() {
          local id="$1"
          case "$id" in
            *lfm2.5*)              echo "true|false" ;;
            *north-mini-code*)     echo "true|false" ;;
            *ornith*)              echo "true|false" ;;
            *gemma4-e2b*)          echo "false|false" ;;
            *gemma4-e4b*)          echo "true|false" ;;
            *gemma4-12b*)          echo "true|false" ;;
            *gemma4-26b*)          echo "true|false" ;;
            *qwen3.6-27b*)         echo "true|true" ;;
            *qwen3.6-35b*)         echo "true|true" ;;
            *-cloud)               echo "true|false" ;;
            *)                     echo "true|false" ;;
          esac
        }

        ctx_for() {
          local id="$1"
          case "$id" in
            glm-5.2-cloud)          echo 976000 ;;
            minimax-m3-cloud)       echo 512000 ;;
            kimi-k2.7-code-cloud)   echo 256000 ;;
            nemotron-3-ultra-cloud) echo 256000 ;;
            nemotron-3-super-cloud) echo 256000 ;;
            *)                      echo "$CTX_SIZE" ;;
          esac
        }

        IFS=',' read -ra WORKING_LIST <<< "$WORKING_MODELS"

        MODELS_JSON='{}'
        for M in "${WORKING_LIST[@]}"; do
          if [[ "$M" == *"-cloud" ]]; then
            NAME_LABEL="Cloud: ${M%-cloud}:cloud"
          else
            NAME_LABEL="Local: $M"
          fi
          CTX_LIM=$(ctx_for "$M")
          CAPS=$(cap_for "$M")
          TOOL_CALL=${CAPS%%|*}
          ATTACH=${CAPS##*|}

          MODELS_JSON=$(echo "$MODELS_JSON" | jq \
            --arg  id    "$M" \
            --arg  name  "$NAME_LABEL" \
            --argjson ctx    "$CTX_LIM" \
            --argjson out    "$PRED_SIZE" \
            --argjson tools  "$TOOL_CALL" \
            --argjson attach "$ATTACH" \
            '. + {
              ($id): {
                "id":          $id,
                "name":        $name,
                "tool_call":   $tools,
                "temperature": true,
                "attachment":  $attach,
                "limit":       {"context": $ctx, "output": $out}
              }
            }')
        done

        DEFAULT_MODEL="github-backend/${WORKING_LIST[0]}"

        jq -n \
          --arg baseURL      "${TUNNEL_URL}/v1" \
          --arg apiKey       "$LITELLM_KEY" \
          --arg defaultModel "$DEFAULT_MODEL" \
          --argjson models   "$MODELS_JSON" \
          '{
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "github-backend": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "GitHub Actions LiteLLM Proxy",
                "options": {
                  "baseURL": $baseURL,
                  "apiKey":  $apiKey,
                  "timeout": 600000
                },
                "models": $models
              }
            },
            "model": $defaultModel
          }' > opencode_config.json

        echo "==== opencode_config.json ===="
        cat opencode_config.json
        jq empty opencode_config.json && echo "JSON is valid." || {
          echo "ERROR: invalid JSON"; exit 1;
        }

    - name: Upload OpenCode config artifact
      uses: actions/upload-artifact@v4
      with:
        name: opencode-config
        path: opencode_config.json

    - name: Deployment summary
      run: |
        set +e
        {
          echo "### Deployment Complete (v3)"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Tunnel | \`${TUNNEL_URL}/v1\` |"
          echo "| Local model | \`${MODEL_TO_USE}\` |"
          echo "| Working models | \`${WORKING_MODELS}\` |"
          echo "| Broken (excluded) | \`${BROKEN_MODELS:-none}\` |"
          [ -n "$PULLED_CLOUD_MODELS" ] && echo "| Cloud pulled | \`${PULLED_CLOUD_MODELS}\` |"
          [ -n "$FAILED_CLOUD_MODELS" ] && echo "| Cloud failed | \`${FAILED_CLOUD_MODELS}\` |"
          echo ""
          echo "> Download **opencode-config** artifact, place at \`~/.opencode/opencode.json\`"
          echo "> Default model: \`${WORKING_MODELS%%,*}\`"
        } >> "$GITHUB_STEP_SUMMARY"

        echo "============================================"
        echo "  Tunnel : ${TUNNEL_URL}/v1"
        echo "  Local  : ${MODEL_TO_USE}"
        echo "  Active : ${WORKING_MODELS}"
        echo "============================================"

    # ------------------------------------------------------------------------
    # KEEP ALIVE
    # ------------------------------------------------------------------------
    - name: Keep alive - health monitor
      run: |
        set +e
        PORT="${{ env.LITELLM_PORT }}"
        FIRST_MODEL=$(echo "$WORKING_MODELS" | cut -d',' -f1)
        echo "Keep-alive: first-model probe target: $FIRST_MODEL"
        ITER=0
        while true; do
          sleep 300
          ITER=$((ITER + 1))
          ELAPSED=$((ITER * 5))

          OLLAMA_OK=0
          curl -s -o /dev/null http://127.0.0.1:11434/api/tags 2>/dev/null && OLLAMA_OK=1
          LITELLM_OK=0
          nc -z localhost "$PORT" 2>/dev/null && LITELLM_OK=1

          echo "[+${ELAPSED}m] Ollama:$OLLAMA_OK LiteLLM:$LITELLM_OK Tunnel:$TUNNEL_URL"

          if [ "$OLLAMA_OK" != "1" ]; then
            echo "ERROR: Ollama down."
            tail -50 ollama.log
            exit 1
          fi
          if [ "$LITELLM_OK" != "1" ]; then
            echo "ERROR: LiteLLM down."
            tail -50 litellm.log
            exit 1
          fi

          # Deep probe every 15 min
          if (( ITER % 3 == 0 )) && [ -n "$FIRST_MODEL" ]; then
            HC=$(curl -s -o /tmp/probe.body -w '%{http_code}' --max-time 240 \
              -H "Authorization: Bearer $LITELLM_KEY" \
              -H "Content-Type: application/json" \
              -X POST "http://localhost:${PORT}/v1/chat/completions" \
              -d "{\"model\":\"$FIRST_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],\"max_tokens\":20}")
            if [ "$HC" = "200" ]; then
              echo "  deep probe OK on $FIRST_MODEL"
            else
              echo "  deep probe FAIL on $FIRST_MODEL (HTTP $HC)"
              tail -30 litellm.log
            fi
          fi
        done
